basePath: /api
definitions:
  dto.BookingInitResponse:
    properties:
      doctors:
        items:
          $ref: '#/definitions/dto.DoctorDTO'
        type: array
      pets:
        items:
          $ref: '#/definitions/dto.PetBriefDTO'
        type: array
      services:
        items:
          $ref: '#/definitions/dto.ServiceDTO'
        type: array
    type: object
  dto.CartItemResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      price:
        type: integer
      productId:
        type: integer
      quantity:
        type: integer
    type: object
  dto.ChangePasswordRequest:
    properties:
      current:
        type: string
      next:
        minLength: 8
        type: string
    required:
    - current
    - next
    type: object
  dto.CompleteVisitRequest:
    properties:
      diagnosis:
        type: string
      medications:
        type: string
      treatment:
        type: string
      weight:
        type: number
    required:
    - diagnosis
    - weight
    type: object
  dto.CreateAppointmentRequest:
    properties:
      comment:
        type: string
      doctor_id:
        type: integer
      pet_id:
        type: integer
      scheduled_at:
        description: '"2024-05-20T09:00:00"'
        type: string
      service_id:
        type: integer
    required:
    - doctor_id
    - pet_id
    - scheduled_at
    type: object
  dto.DashboardResponse:
    properties:
      appointmentsCount:
        type: integer
      nextAppointment:
        $ref: '#/definitions/dto.NextAppointmentDTO'
      pets:
        items:
          $ref: '#/definitions/dto.PetBriefDTO'
        type: array
      petsCount:
        type: integer
      recentAppointments:
        items:
          $ref: '#/definitions/dto.RecentAppointmentDTO'
        type: array
      visitsCount:
        type: integer
    type: object
  dto.DoctorDTO:
    properties:
      doctorId:
        type: integer
      firstName:
        type: string
      lastName:
        type: string
      specialization:
        type: string
    type: object
  dto.DoctorScheduleDTO:
    properties:
      date:
        type: string
      id:
        type: integer
      ownerName:
        type: string
      petName:
        type: string
      service:
        type: string
      status:
        type: string
      time:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      lastName:
        type: string
      phone:
        type: string
      role:
        type: string
      token:
        type: string
      userId:
        type: integer
      userName:
        type: string
    type: object
  dto.NextAppointmentDTO:
    properties:
      date:
        type: string
      petName:
        type: string
      time:
        type: string
    type: object
  dto.OrderRequest:
    properties:
      totalAmount:
        type: integer
      userId:
        type: integer
    type: object
  dto.PatientDTO:
    properties:
      email:
        type: string
      fullName:
        type: string
      id:
        type: integer
      lastVisit:
        type: string
      petsCount:
        type: integer
      phone:
        type: string
    type: object
  dto.PetBriefDTO:
    properties:
      avatar:
        type: string
      breed:
        type: string
      dob:
        type: string
      id:
        type: integer
      name:
        type: string
      weight:
        type: number
    type: object
  dto.PetHistoryDTO:
    properties:
      petIcon:
        type: string
      petName:
        type: string
      visits:
        items:
          $ref: '#/definitions/dto.VisitTimelineDTO'
        type: array
    type: object
  dto.PetRequest:
    properties:
      avatar:
        type: string
      breed:
        type: string
      dob:
        type: string
      name:
        type: string
      species:
        type: string
      weight:
        type: number
    required:
    - dob
    - name
    - species
    type: object
  dto.PetResponse:
    properties:
      avatar:
        type: string
      breed:
        type: string
      dob:
        type: string
      name:
        type: string
      petId:
        type: integer
      species:
        type: string
      weight:
        type: number
    type: object
  dto.ProductResponse:
    properties:
      category:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        type: integer
      stock:
        type: integer
    type: object
  dto.RecentAppointmentDTO:
    properties:
      date:
        type: string
      doctorName:
        type: string
      id:
        type: integer
      petName:
        type: string
      service:
        type: string
      status:
        type: string
      time:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  dto.ServiceDTO:
    properties:
      id:
        type: integer
      name:
        type: string
      price:
        type: integer
    type: object
  dto.UpdateProfileRequest:
    properties:
      firstName:
        type: string
      lastName:
        type: string
      phone:
        type: string
    required:
    - firstName
    - lastName
    type: object
  dto.UserProfileResponse:
    properties:
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
      lastName:
        type: string
      petsCount:
        type: integer
      phone:
        type: string
      role:
        type: string
      visitsCount:
        type: integer
    type: object
  dto.VisitTimelineDTO:
    properties:
      date:
        type: string
      diagnosis:
        type: string
      id:
        type: integer
      treatment:
        type: string
    type: object
  dto.WeightDataDTO:
    properties:
      date:
        type: string
      weight:
        type: number
    type: object
host: localhost:3000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API server for Veterinary Clinic management system.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Veterinary Clinic API
  version: "1.0"
paths:
  /appointments:
    post:
      consumes:
      - application/json
      description: Book a new visit to a doctor
      parameters:
      - description: Appointment Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAppointmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create appointment
      tags:
      - booking
  /appointments/{id}/complete:
    patch:
      consumes:
      - application/json
      description: Finish appointment and save medical protocol (diagnosis, treatment)
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Protocol Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CompleteVisitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Complete visit
      tags:
      - doctor
  /appointments/busy-slots:
    get:
      description: Get list of already booked times for a specific doctor and date
      parameters:
      - description: Doctor ID
        in: query
        name: doctor_id
        required: true
        type: integer
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get busy time slots
      tags:
      - booking
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account (client by default)
      parameters:
      - description: Registration Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /book/init/{userId}:
    get:
      description: Get lists of pets, doctors and services for booking
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingInitResponse'
      security:
      - ApiKeyAuth: []
      summary: Initialize booking page
      tags:
      - booking
  /cart/{itemId}:
    delete:
      description: Remove an item from cart entirely
      parameters:
      - description: Cart Item ID
        in: path
        name: itemId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Remove from cart
      tags:
      - shop
    put:
      consumes:
      - application/json
      description: Change the quantity of an item in cart
      parameters:
      - description: Cart Item ID
        in: path
        name: itemId
        required: true
        type: integer
      - description: New Quantity
        in: body
        name: request
        required: true
        schema:
          properties:
            quantity:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update cart item quantity
      tags:
      - shop
  /cart/{userId}:
    get:
      description: Get all items in user's shopping cart
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CartItemResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get user cart
      tags:
      - shop
    post:
      consumes:
      - application/json
      description: Add a medication to user's cart
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: Product Info
        in: body
        name: request
        required: true
        schema:
          properties:
            productId:
              type: integer
            quantity:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Add item to cart
      tags:
      - shop
  /dashboard/{userId}:
    get:
      description: Get summary stats, next appointment, and recent activity
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DashboardResponse'
      security:
      - ApiKeyAuth: []
      summary: Get dashboard data
      tags:
      - dashboard
  /doctor/patients:
    get:
      description: Search for clients by name or phone
      parameters:
      - description: Search query
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PatientDTO'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Search patients
      tags:
      - doctor
  /doctor/patients/{id}/history:
    get:
      description: Get all past visits and protocols for a client's pets
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PetHistoryDTO'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get medical history
      tags:
      - doctor
  /doctor/schedule:
    get:
      description: Get list of appointments for a specific doctor
      parameters:
      - description: Doctor ID
        in: query
        name: doctor_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.DoctorScheduleDTO'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get doctor schedule
      tags:
      - doctor
  /medications:
    get:
      description: Get list of all available medications in shop
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductResponse'
            type: array
      summary: Get medications
      tags:
      - shop
  /orders:
    post:
      consumes:
      - application/json
      description: Process the cart and create an order
      parameters:
      - description: Order Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Checkout order
      tags:
      - shop
  /pets:
    post:
      consumes:
      - application/json
      description: Create a new pet card
      parameters:
      - description: Owner ID
        in: query
        name: ownerId
        required: true
        type: integer
      - description: Pet Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.PetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.PetResponse'
      security:
      - ApiKeyAuth: []
      summary: Add a pet
      tags:
      - pets
  /pets/{petId}:
    delete:
      description: Remove a pet card from system
      parameters:
      - description: Pet ID
        in: path
        name: petId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete pet
      tags:
      - pets
    put:
      consumes:
      - application/json
      description: Update existing pet information
      parameters:
      - description: Pet ID
        in: path
        name: petId
        required: true
        type: integer
      - description: Pet Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.PetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PetResponse'
      security:
      - ApiKeyAuth: []
      summary: Update pet
      tags:
      - pets
  /pets/owner/{userId}:
    get:
      description: Get list of all pets belonging to a user
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PetResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get owner pets
      tags:
      - pets
  /stats/pets/{userId}:
    get:
      description: Get a simplified list of pets for the weight chart selector
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              properties:
                id:
                  type: integer
                name:
                  type: string
              type: object
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get user pets for stats
      tags:
      - stats
  /stats/weight/{petId}:
    get:
      description: Get chronological weight data for Chart.js
      parameters:
      - description: Pet ID
        in: path
        name: petId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.WeightDataDTO'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get weight history
      tags:
      - stats
  /users/{id}:
    get:
      description: Get full user profile including pet and visit counts
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfileResponse'
      security:
      - ApiKeyAuth: []
      summary: Get user profile
      tags:
      - user
    put:
      consumes:
      - application/json
      description: Update user's name or phone
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Profile Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update profile
      tags:
      - user
  /users/{id}/password:
    put:
      consumes:
      - application/json
      description: Update user's password after checking current one
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Password Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Change password
      tags:
      - user
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
